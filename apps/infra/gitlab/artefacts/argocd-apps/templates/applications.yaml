---
# Source: argocd-apps/templates/applications.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab
spec:
  project: default
  source:
    chart: gitlab
    helm:
      values: |
        upgradeCheck:
          enabled: false
        global:
          edition: ce
          hosts:
            domain: scm.localhost
            https: false
          url: http://gitlab-webservice-default.gitlab.svc.cluster.local:8080
        ingress:
          enabled: false
        certmanager-issuer:
          enabled: false
          email: "x@x.com"
        certmanager:
          installCRDs: false
        installCertmanager: false
        gatewayApi:
          enabled: true
        gitlab-runner:
          enabled: true
          gitlabUrl: http://gitlab-webservice-default.gitlab.svc.cluster.local:8080
        prometheus:
          install: false
        nginx-ingress:
          enabled: false
    repoURL: https://charts.gitlab.io/
    targetRevision: '*'
  destination:
    name: in-cluster
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
# Source: argocd-apps/templates/applications.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitlab-ingress
spec:
  project: default
  source:
    chart: raw
    helm:
      values: |
        resources:
          - apiVersion: traefik.io/v1alpha1
            kind: Middleware
            metadata:
              name: gitlab-assets-passthrough
              namespace: gitlab
            spec:
              headers:
                customResponseHeaders:
                  X-Content-Type-Options: ""
          - apiVersion: traefik.io/v1alpha1
            kind: IngressRoute
            metadata:
              name: gitlab
              namespace: gitlab
            spec:
              entryPoints:
                - web
              routes:
                - kind: Rule
                  match: Host(`gitlab.scm.localhost`)
                  priority: 10
                  middlewares:
                    - name: gitlab-assets-passthrough
                  services:
                    - name: gitlab-webservice-default
                      port: 8181
    repoURL: https://charts.helm.sh/incubator
    targetRevision: '*'
  destination:
    name: in-cluster
    namespace: gitlab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
