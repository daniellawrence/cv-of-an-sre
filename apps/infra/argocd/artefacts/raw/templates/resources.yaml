apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  labels:
    app: raw
    chart: raw-0.2.5
    heritage: Helm
    release: argocd-server-ingress-route
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
  - web
  routes:
  - kind: Rule
    match: Host(`argocd.localhost`)
    priority: 10
    services:
    - name: argocd-server
      port: 80
