---
helmDefaults:
  atomic: true
  cleanupOnFail: true
  wait: true
  timeout: 600
  recreatePods: false
  force: false

repositories:
  - name: argo
    url: https://argoproj.github.io/argo-helm

releases:
  - name: nginx-ingress-app
    namespace: argocd
    createNamespace: true
    chart: argo/argocd-apps
    version: "1.6.0"
    values:
      - applications:
          - name: nginx-ingress
            namespace: argocd
            additionalLabels: {}
            additionalAnnotations: {}
            finalizers:
              - resources-finalizer.argocd.argoproj.io
            project: default
            source:
              repoURL: https://kubernetes.github.io/ingress-nginx
              chart: ingress-nginx
              targetRevision: "4.10.0"
              helm:
                releaseName: nginx-ingress
                values: |
                  controller:
                    service:
                      type: LoadBalancer
                    metrics:
                      enabled: true
                    podAnnotations:
                      prometheus.io/scrape: "true"
                      prometheus.io/port: "10254"
            destination:
              name: "in-cluster"
              namespace: ingress-nginx
            syncPolicy:
              automated:
                prune: true
                selfHeal: true
              syncOptions:
                - CreateNamespace=true
              retry:
                limit: 5
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m