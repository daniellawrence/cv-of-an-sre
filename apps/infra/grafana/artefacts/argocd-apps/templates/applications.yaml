---
# Source: argocd-apps/templates/applications.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
spec:
  project: default
  source:
    chart: grafana
    helm:
      values: |
        # x
    repoURL: https://grafana-community.github.io/helm-charts
    targetRevision: '*'
  destination:
    name: in-cluster
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
---
# Source: argocd-apps/templates/applications.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-ingress
spec:
  project: default
  source:
    chart: raw
    helm:
      values: |
        resources:
          - apiVersion: traefik.io/v1alpha1
            kind: IngressRoute
            metadata:
              name: grafana
              namespace: grafana
            spec:
              entryPoints:
                - web
              routes:
                - kind: Rule
                  match: Host(`grafana.localhost`)
                  priority: 10
                  services:
                    - name: grafana
                      port: 80
    repoURL: https://charts.helm.sh/incubator
    targetRevision: '*'
  destination:
    name: in-cluster
    namespace: grafana
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
