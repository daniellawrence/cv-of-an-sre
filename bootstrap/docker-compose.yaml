services:
  localstack:
    image: localstack/localstack:4.8.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=cloudformation,s3,iam,dynamodb,sqs,sns,lambda
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_EXECUTOR=docker
      - LAMBDA_DOCKER_NETWORK=cv_default
    volumes:
      - "./localstack/init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cv_default

networks:
  cv_default:
    name: cv_default
