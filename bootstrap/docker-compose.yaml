services:
  localstack:
    image: localstack/localstack:4.8.0
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=cloudformation,s3,iam,dynamodb,eks,ec2,secretsmanager,ssm,sqs,sns,lambda
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LAMBDA_EXECUTOR=docker
      - LAMBDA_DOCKER_NETWORK=cv_default
      - EKS_PROVIDER=kind
      - ENFORCE_IAM=1
    volumes:
      - "./localstack/init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack/data:/var/lib/localstack"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - cv_default

  kind:
    build:
      context: k8s/.
      dockerfile: Dockerfile
    container_name: kind-control
    command: >
      /scripts/create-cluster.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./k8s/kind-config.yaml:/config/kind-config.yaml
      - ./k8s/scripts:/scripts
      - ./k8s/.kube:/root/.kube
    networks:
      - cv_default

networks:
  cv_default:
    name: cv_default
