kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: local

networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443

nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30443
        hostPort: 30443
        protocol: TCP