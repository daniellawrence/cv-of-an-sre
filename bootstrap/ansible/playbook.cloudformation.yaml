---
- name: Deploy and wait for CloudFormation
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    stack_name: terraform-stack
    region: us-east-1
    endpoint: http://localstack:4566
    success_states:
      - CREATE_COMPLETE
      - UPDATE_COMPLETE
    failure_states:
      - CREATE_FAILED
      - UPDATE_FAILED

  tasks:

    - name: Deploy or update stack
      amazon.aws.cloudformation:
        stack_name: "{{ stack_name }}"
        state: present
        region: "{{ region }}"
        endpoint_url: "{{ endpoint }}"
        validate_certs: false
        template_body: "{{ lookup('file', '../cloudformation/bootstrap/terraform-stack.yaml') }}"
        capabilities:
          - CAPABILITY_NAMED_IAM
      register: deploy_result

    - name: Poll stack status until complete
      amazon.aws.cloudformation_info:
        stack_name: "{{ stack_name }}"
        region: "{{ region }}"
        endpoint_url: "{{ endpoint }}"
        validate_certs: false
      register: stack_info
      retries: 30
      delay: 10
      until:
        - stack_info.cloudformation[stack_name].stack_description.stack_status in success_states + failure_states
   
    - name: Fail if stack did not succeed
      fail:
        msg: "Stack failed with status {{ stack_info.cloudformation[stack_name].stack_description.stack_status }}"
      when: stack_info.cloudformation[stack_name].stack_description.stack_status not in success_states

    - name: Show final status
      debug:
        msg: "Stack finished with {{ stack_info.cloudformation[stack_name].stack_description.stack_status }}"